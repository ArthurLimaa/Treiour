<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TREIOR - Seu Treino</title>

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../CSS/treinos.css">
</head>

<body>

    <!-- FUNDO -->
    <div class="blur blur1"></div>
    <div class="blur blur2"></div>

    <!-- HEADER -->
    <header>

        <!-- MENU -->
        <div class="menu-wrapper">

            <button class="menu" id="menuBtn">
                <i class='bx bx-menu'></i>
                MENU
            </button>

            <div class="dropdown-menu" id="dropdownMenu">

                <a href="../HTML/menu2.html">
                    <i class='bx bx-home'></i>
                    Início
                </a>

                <a href="treinos.html">
                    <i class='bx bx-dumbbell'></i>
                    Seu Treino
                </a>

                <a href="../HTML/analise.html">
                    <i class='bx bx-line-chart'></i>
                    Análises
                </a>

                <a href="../HTML/competicao.html">
                    <i class='bx bx-trophy'></i>
                    Competição
                </a>

            </div>

        </div>

        <img src="../imagens/Logo.png" class="logo" alt="TREIOR">

    </header>

    <!-- CONTAINER -->
    <main class="container">

        <!-- CARD PRINCIPAL -->
        <section class="painel-treino">

            <h1>Seu Treino</h1>

            <p class="subtitulo">
                Escolha um dia da semana para visualizar e iniciar seu treino.
            </p>

            <!-- TIMER -->
            <div class="timer-box">

                <span id="timer">
                    00:00:00
                </span>

                <p id="statusTreino">
                    Nenhum treino iniciado
                </p>

            </div>

            <!-- BOTÕES -->
            <div class="acoes-treino">

                <button class="botao-principal" id="btnTreino">
                    <i class='bx bx-play'></i>
                    INICIAR TREINO
                </button>

                <button class="botao-secundario" id="btnEditar">
                    <i class='bx bx-edit'></i>
                    EDITAR TREINO
                </button>

            </div>

        </section>

        <!-- DIAS -->
        <section class="dias-semana">

            <button class="btn-dia active" data-dia="Segunda">
                Segunda
            </button>

            <button class="btn-dia" data-dia="Terça">
                Terça
            </button>

            <button class="btn-dia" data-dia="Quarta">
                Quarta
            </button>

            <button class="btn-dia" data-dia="Quinta">
                Quinta
            </button>

            <button class="btn-dia" data-dia="Sexta">
                Sexta
            </button>

            <button class="btn-dia" data-dia="Sábado">
                Sábado
            </button>

            <button class="btn-dia" data-dia="Domingo">
                Domingo
            </button>

        </section>

        <!-- TREINO -->
        <section class="treino-box">

            <div class="topo-treino">

                <h2 id="tituloDia">
                    Treino de Segunda
                </h2>

                <button class="btn-add-exercicio" id="btnNovoExercicio">
                    <i class='bx bx-plus'></i>
                    Novo Exercício
                </button>

            </div>

            <div class="lista-treino" id="listaTreino"></div>

        </section>

    </main>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">

        <div class="modal">

            <div class="modal-topo">

                <h2>Adicionar Exercício</h2>

                <button class="fechar-modal" id="fecharModal">
                    <i class='bx bx-x'></i>
                </button>

            </div>

            <div class="campo">

                <label>Grupo muscular</label>

                <select id="grupoMuscular">

                    <option value="">Selecione</option>

                    <option value="Peito">Peito</option>

                    <option value="Braço">Braço</option>

                    <option value="Ombro">Ombro</option>

                    <option value="Costas">Costas</option>

                    <option value="Pernas">Pernas</option>

                    <option value="Abdômen">Abdômen</option>

                </select>

            </div>

            <div class="campo">

                <label>Exercício</label>

                <select id="nomeExercicio">

                    <option value="">Selecione um grupo muscular</option>

                </select>

            </div>

            <div class="campo">

                <label>Séries</label>

                <input type="text" id="seriesExercicio" placeholder="Ex: 4x12">

            </div>

            <div class="campo">

                <label>Peso</label>

                <input type="text" id="pesoExercicio" placeholder="Ex: 20kg">

            </div>

            <button class="salvar-exercicio" id="salvarExercicio">
                <i class='bx bx-save'></i>
                Salvar Exercício
            </button>

        </div>

    </div>

    <script src="../JS/treinos.js"></script>

</body>

</html>
